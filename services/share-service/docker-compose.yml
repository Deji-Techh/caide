services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: caide
      POSTGRES_PASSWORD: caide
      POSTGRES_DB: caide_share
    ports: ["5432:5432"]
    volumes:
      - share-postgres:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caide -d caide_share"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: caide
      MINIO_ROOT_PASSWORD: caide-local-secret
    ports: ["9000:9000", "9001:9001"]
    volumes: ["share-minio:/data"]

  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >-
      /bin/sh -c '
      until mc alias set local http://minio:9000 caide caide-local-secret; do sleep 2; done;
      mc mb --ignore-existing local/caide-shares;
      mc anonymous set none local/caide-shares;
      '

  share-service:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://caide:caide@postgres:5432/caide_share
      S3_ENDPOINT: http://minio:9000
    ports: ["8787:8787"]
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  share-postgres: {}
  share-minio: {}
